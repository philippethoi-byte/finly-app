<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finly - Chuyên Gia Tài Chính</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500">Finly</h1>
            <nav class="flex gap-4 bg-slate-800 p-1 rounded-lg">
                <button onclick="showTab('dashboard')" class="px-4 py-2 rounded-md hover:bg-slate-700">Tổng quan</button>
                <button onclick="showTab('history')" class="px-4 py-2 rounded-md hover:bg-slate-700">Lịch sử</button>
                <button onclick="showTab('savings')" class="px-4 py-2 rounded-md hover:bg-slate-700">Tiết kiệm</button>
                <button onclick="showTab('reports')" class="px-4 py-2 rounded-md hover:bg-slate-700">Báo cáo</button>
            </nav>
        </header>

        <div id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="card border-l-4 border-blue-500">
                    <p class="text-slate-400 text-sm">Tổng tài sản</p>
                    <h2 id="sum-assets" class="text-2xl font-bold">0đ</h2>
                </div>
                <div class="card border-l-4 border-emerald-500">
                    <p class="text-slate-400 text-sm">Số dư ví</p>
                    <h2 id="sum-balance" class="text-2xl font-bold">0đ</h2>
                </div>
                <div class="card border-l-4 border-orange-500">
                    <p class="text-slate-400 text-sm">Tiền tiết kiệm</p>
                    <h2 id="sum-savings" class="text-2xl font-bold">0đ</h2>
                </div>
                <div class="card border-l-4 border-red-500">
                    <p class="text-slate-400 text-sm">Chi tiêu tháng</p>
                    <h2 id="sum-expense" class="text-2xl font-bold text-red-400">0đ</h2>
                </div>
            </div>
            <button onclick="openTransactionModal()" class="w-full py-4 bg-blue-600 rounded-xl font-bold hover:bg-blue-700">+ THÊM GIAO DỊCH MỚI</button>
        </div>

        <div id="history" class="tab-content card">
            <h3 class="text-xl font-bold mb-4">Lịch sử giao dịch</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-slate-400 border-b border-slate-700">
                        <tr>
                            <th class="p-3">Ngày</th>
                            <th class="p-3">Hạng mục</th>
                            <th class="p-3">Số tiền</th>
                            <th class="p-3">Mô tả</th>
                            <th class="p-3 text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="tx-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="savings" class="tab-content space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold">Gói tiết kiệm & Đầu tư</h3>
                <button onclick="openSavingsModal()" class="px-4 py-2 bg-emerald-600 rounded-lg">+ Thêm gói</button>
            </div>
            <div id="savings-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>

        <div id="reports" class="tab-content grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card">
                <h4 class="mb-4 font-bold">Phân bổ chi tiêu (%)</h4>
                <canvas id="chart-pie" height="300"></canvas>
            </div>
            <div class="card">
                <h4 class="mb-4 font-bold">Chi tiêu theo hạng mục</h4>
                <div id="category-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="modal-tx" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-md p-6 rounded-2xl">
            <h2 id="modal-tx-title" class="text-xl font-bold mb-4">Giao dịch</h2>
            <div class="space-y-4">
                <select id="tx-type" class="w-full bg-slate-900 p-3 rounded-lg">
                    <option value="expense">Chi tiêu (-)</option>
                    <option value="income">Thu nhập (+)</option>
                </select>
                <input type="number" id="tx-amount" placeholder="Số tiền" class="w-full bg-slate-900 p-3 rounded-lg">
                <input type="date" id="tx-date" class="w-full bg-slate-900 p-3 rounded-lg">
                <select id="tx-cat" class="w-full bg-slate-900 p-3 rounded-lg"></select>
                <input type="text" id="tx-desc" placeholder="Ghi chú" class="w-full bg-slate-900 p-3 rounded-lg">
                <div class="flex gap-2">
                    <button onclick="closeModal('modal-tx')" class="flex-1 py-3 bg-slate-700 rounded-lg">Hủy</button>
                    <button id="btn-save-tx" class="flex-1 py-3 bg-blue-600 rounded-lg">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://<TEN-APP-CUA-BAN>.onrender.com/api'; // THAY LINK RENDER CỦA BẠN
        let editingTxId = null;
        const fmt = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' });

        async function apiCall(path, method = 'GET', body = null) {
            const res = await fetch(`${API}${path}`, {
                method, headers: { 'Content-Type': 'application/json' },
                body: body ? JSON.stringify(body) : null
            });
            const json = await res.json();
            if (!json.success) alert(json.message);
            return json.data;
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (tabId === 'dashboard') loadDashboard();
            if (tabId === 'history') loadHistory();
            if (tabId === 'savings') loadSavings();
            if (tabId === 'reports') loadReports();
        }

        async function loadDashboard() {
            const d = await apiCall('/dashboard/summary');
            document.getElementById('sum-assets').innerText = fmt.format(d.totalAssets);
            document.getElementById('sum-balance').innerText = fmt.format(d.balance);
            document.getElementById('sum-savings').innerText = fmt.format(d.totalSavings);
            document.getElementById('sum-expense').innerText = fmt.format(d.monthlyExpense);
        }

        async function loadHistory() {
            const txs = await apiCall('/transactions');
            const tbody = document.getElementById('tx-table-body');
            tbody.innerHTML = txs.map(t => `
                <tr class="border-b border-slate-800 hover:bg-slate-800/50">
                    <td class="p-3 text-sm">${t.date}</td>
                    <td class="p-3"><span class="px-2 py-1 rounded text-xs ${t.type==='income'?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}">${t.category}</span></td>
                    <td class="p-3 font-bold ${t.type==='income'?'text-emerald-400':'text-red-400'}">${t.type==='income'?'+':'-'}${fmt.format(t.amount)}</td>
                    <td class="p-3 text-slate-400 text-sm">${t.description || ''}</td>
                    <td class="p-3 text-right space-x-2">
                        <button onclick="editTx('${t.id}')" class="text-blue-400 hover:underline">Sửa</button>
                        <button onclick="deleteTx('${t.id}')" class="text-red-400 hover:underline">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteTx(id) {
            if (confirm('Xóa giao dịch này?')) {
                await apiCall(`/transactions/${id}`, 'DELETE');
                loadHistory();
            }
        }

        function openTransactionModal(data = null) {
            editingTxId = data?.id || null;
            document.getElementById('modal-tx-title').innerText = editingTxId ? 'Sửa giao dịch' : 'Thêm giao dịch';
            document.getElementById('tx-amount').value = data?.amount || '';
            document.getElementById('tx-date').value = data?.date || new Date().toISOString().split('T')[0];
            document.getElementById('tx-desc').value = data?.description || '';
            document.getElementById('modal-tx').classList.remove('hidden');
        }

        document.getElementById('btn-save-tx').onclick = async () => {
            const body = {
                type: document.getElementById('tx-type').value,
                amount: Number(document.getElementById('tx-amount').value),
                date: document.getElementById('tx-date').value,
                category: document.getElementById('tx-cat').value,
                description: document.getElementById('tx-desc').value
            };
            const method = editingTxId ? 'PUT' : 'POST';
            const path = editingTxId ? `/transactions/${editingTxId}` : '/transactions';
            await apiCall(path, method, body);
            document.getElementById('modal-tx').classList.add('hidden');
            showTab('history');
        };

        async function loadReports() {
            const d = await apiCall('/dashboard/summary');
            const ctx = document.getElementById('chart-pie').getContext('2d');
            
            if (window.myChart) window.myChart.destroy();
            
            const labels = Object.keys(d.categoryBreakdown);
            const values = Object.values(d.categoryBreakdown);
            const total = values.reduce((a, b) => a + b, 0);

            window.myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
            });

            document.getElementById('category-list').innerHTML = labels.map((l, i) => `
                <div class="flex justify-between items-center text-sm">
                    <span>${l}</span>
                    <span class="font-bold">${((values[i]/total)*100).toFixed(1)}% (${fmt.format(values[i])})</span>
                </div>
            `).join('');
        }

        // Khởi tạo ứng dụng
        window.onload = async () => {
            const cats = await apiCall('/categories');
            const select = document.getElementById('tx-cat');
            select.innerHTML = [...cats.income, ...cats.expense].map(c => `<option value="${c}">${c}</option>`).join('');
            loadDashboard();
        };

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
